services:
  - type: web
    name: orchestrai-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_EXTERNAL_URL
        value: "https://orchestrai-u3wt.onrender.com"
      - key: GITHUB_REPO
        value: "orchestrAI"
      - key: GITHUB_USERNAME
        value: "Dharshanashri-2986"
